# nginx config for the Sit Happens frontend container.
# - Serves the React SPA bundle from /usr/share/nginx/html
# - Proxies /api/* to the backend container on port 8001
# - Allows large uploads (vaccine certs, dog photos can be a few MB even after compression)
# - SPA fallback (history-mode routing): every non-asset request falls back to index.html

server {
    listen 80;
    server_name _;

    client_max_body_size 25M;

    # Compress the React bundle and JSON responses on the local network.
    # Cloudflare may also compress public traffic, but LAN/PWA use should not
    # depend on Cloudflare being in the path.
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss image/svg+xml;

    # Safe response headers. These do not change app behavior or stored data.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Backend API
    location /api/ {
        proxy_pass         http://backend:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Long-cached static assets (CRA hashes filenames so this is safe).
    location /static/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache unhashed public images/fonts too. The HTML shell remains no-cache,
    # so deployments still pick up new bundles immediately.
    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Everything else: SPA fallback so React Router works on refresh / deep links.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
