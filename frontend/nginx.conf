# nginx config for the Sit Happens frontend container.
# - Serves the React SPA bundle from /usr/share/nginx/html
# - Proxies /api/* to the backend container on port 8001
# - Allows large uploads (vaccine certs, dog photos can be a few MB even after compression)
# - SPA fallback (history-mode routing): every non-asset request falls back to index.html

server {
    listen 80;
    server_name _;

    client_max_body_size 25M;

    # Safe response headers. These do not change app behavior or stored data.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Backend API
    location /api/ {
        proxy_pass         http://backend:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Long-cached static assets (CRA hashes filenames so this is safe).
    location /static/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Everything else: SPA fallback so React Router works on refresh / deep links.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
